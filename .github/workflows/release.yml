name: Release
on:
  push:
    tags:
    - '*'

jobs:
  build-for-macos-intel:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v3
    - name: Add targets
      run: rustup target add x86_64-apple-darwin
    - name: Build
      run: cargo build --release --target x86_64-apple-darwin
    - name: Run tests
      run: cargo test
    - name: Set env
      run: |
        echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
        echo "BIN_NAME=$(cat Cargo.toml | grep name | sed -E 's/.*"(.*)".*/\1/')" >> $GITHUB_ENV
    - name: Zip artifacts
      run: |
        mkdir -p artifacts/
        pushd artifacts
        zip -j ${BIN_NAME}-${RELEASE_VERSION}-x86_64-apple-darwin.zip ../target/x86_64-apple-darwin/release/${BIN_NAME}
        popd
    - uses: actions/upload-artifact@v2
      with:
        name: macos-binary-intel
        path: artifacts/*.zip
  build-for-macos-m1:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v3
    - name: Add targets
      run: rustup target add aarch64-apple-darwin
    - name: Build
      run: cargo build --release --target aarch64-apple-darwin
    - name: Run tests
      run: cargo test
    - name: Set env
      run: |
        echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
        echo "BIN_NAME=$(cat Cargo.toml | grep name | sed -E 's/.*"(.*)".*/\1/')" >> $GITHUB_ENV
    - name: Zip artifacts
      run: |
        mkdir -p artifacts/
        pushd artifacts
        zip -j ${BIN_NAME}-${RELEASE_VERSION}-aarch64-apple-darwin.zip ../target/aarch64-apple-darwin/release/${BIN_NAME}
        popd
    - uses: actions/upload-artifact@v2
      with:
        name: macos-binary-m1
        path: artifacts/*.zip
  build-for-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Add targets
      run: rustup target add x86_64-unknown-linux-musl
    - name: Build
      run: cargo build --release --target x86_64-unknown-linux-musl
    - name: Run tests
      run: cargo test
    - name: Set env
      run: |
        echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
        echo "BIN_NAME=$(cat Cargo.toml | grep name | sed -E 's/.*"(.*)".*/\1/')" >> $GITHUB_ENV
    - name: Zip artifacts
      run: |
        mkdir -p artifacts/
        pushd artifacts
        echo zip ${BIN_NAME}-${RELEASE_VERSION}-x86_64-unknown-linux-musl.zip ../target/x86_64-unknown-linux-musl/release/${BIN_NAME}
        zip -j ${BIN_NAME}-${RELEASE_VERSION}-x86_64-unknown-linux-musl.zip ../target/x86_64-unknown-linux-musl/release/${BIN_NAME}
        popd
    - uses: actions/upload-artifact@v3
      with:
        name: linux-binary
        path: artifacts/*.zip

  generate-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc
      - name: Generate manpage
        run: |
          mkdir -p artifacts/docs
          pandoc doc/urlendec.1.md -s -t man -o artifacts/docs/urlendec.1
      - uses: actions/upload-artifact@v3
        with:
          name: manpage
          path: artifacts/docs/*

  release:
    needs: [build-for-macos-intel, build-for-macos-m1, build-for-linux, generate-docs]
    runs-on:  ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v3
    - uses: actions/download-artifact@v3
      with:
        path: artifacts/
    - uses: ncipollo/release-action@v1
      with:
        artifacts: "artifacts/**/*.zip"

